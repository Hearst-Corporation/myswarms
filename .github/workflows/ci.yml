name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # WHY not a plain `npm ci`: the committed package-lock.json is generated
        # on macOS, so npm only materializes the host platform's optional native
        # bindings as installable tree entries (only @rolldown/binding-darwin-arm64,
        # @unrs/resolver-binding-darwin-arm64, lightningcss-darwin-arm64). On the
        # Linux runner, strict `npm ci` then installs ZERO of the linux-x64-gnu
        # bindings, and vitest 4 (rolldown) crashes at startup with
        # "Cannot find module '@rolldown/binding-linux-x64-gnu'" (npm bug #4828).
        # `npm install` (non-strict) lets npm resolve and add the Linux bindings
        # for the runner platform. --no-audit --no-fund keep the step quiet.
        # The lockfile is NOT committed back from CI — this only fixes the runner
        # node_modules; reproducibility of resolved versions is preserved because
        # npm install still honors the existing lockfile's version ranges.
        run: npm install --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (Next.js)
        run: npm run build

  engine:
    name: Python engine — Ruff · Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/crewai-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check src/

      # Format check skipped for pre-existing code — would require full reformat.
      # Run locally: uv run ruff format src/ to fix.
      # - name: Ruff format check
      #   run: uv run ruff format --check src/

      - name: Pytest (unit — no network)
        env:
          CREWAI_ENGINE_AUTH_TOKEN: "00000000000000000000000000000000"
          # All other secrets absent → tests stub Supabase/LLM via mocks
        run: uv run pytest tests/ -q --ignore=tests/test_vault_search.py --ignore=tests/test_composio_session.py -x
